<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.1" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.05" r="0.55">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <text x="90" y="185" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="8" fill="#8b8cf1">AGREGADOR DE EVALUACIONES</text>

  <text x="84" y="300" font-family="Helvetica Neue, Arial, sans-serif" font-size="110" font-weight="800" fill="#e4e4e7">Cine<tspan fill="url(#brand)">Rank</tspan></text>

  <text x="90" y="390" font-family="Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="400" fill="#a1a1aa">Todas las notas de una película en un solo lugar.</text>
  <text x="90" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="400" fill="#a1a1aa">Compara y decide cuál ver.</text>

  <!-- pills de fuentes -->
  <g font-family="Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="600">
    <rect x="90" y="505" rx="26" width="150" height="52" fill="none" stroke="#f5c518" stroke-opacity="0.7" stroke-width="2"/>
    <text x="165" y="539" text-anchor="middle" fill="#f5c518">IMDb</text>
    <rect x="260" y="505" rx="26" width="270" height="52" fill="none" stroke="#fa320a" stroke-opacity="0.7" stroke-width="2"/>
    <text x="395" y="539" text-anchor="middle" fill="#fa5a3c">Rotten Tomatoes</text>
    <rect x="550" y="505" rx="26" width="230" height="52" fill="none" stroke="#4d7ecf" stroke-opacity="0.8" stroke-width="2"/>
    <text x="665" y="539" text-anchor="middle" fill="#7ba3e0">FilmAffinity</text>
    <rect x="800" y="505" rx="26" width="200" height="52" fill="none" stroke="#00ce7a" stroke-opacity="0.7" stroke-width="2"/>
    <text x="900" y="539" text-anchor="middle" fill="#2fe09a">Metacritic</text>
    <rect x="1020" y="505" rx="26" width="90" height="52" fill="none" stroke="#52525b" stroke-width="2"/>
    <text x="1065" y="539" text-anchor="middle" fill="#a1a1aa">+2</text>
  </g>

  <!-- nota media de ejemplo -->
  <circle cx="1010" cy="230" r="105" fill="#0e0e14" stroke="url(#brand)" stroke-width="6"/>
  <text x="1010" y="252" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="700" fill="#22c55e">8.6</text>
  <text x="1010" y="300" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#71717a">MEDIA /10</text>
</svg>
